# Fly.io deployment configuration for Recall Touch voice server
# FREE TIER: CPU-only mode for development and testing
# UPGRADE: Switch to GPU when ready for production (see comments below)

app = "recall-voice"
primary_region = "iad" # Northern Virginia, closest to Supabase us-east-2

[build]
dockerfile = "Dockerfile.cpu"

[http_service]
internal_port = 8100
force_https = true
auto_stop_machines = true    # Stop when idle (saves money)
auto_start_machines = true   # Start on first request
min_machines_running = 1     # Keep one warm machine to avoid cold-start gaps

[http_service.concurrency]
type = "connections"
hard_limit = 100
soft_limit = 50

[[http_service.checks]]
interval = "15s"
timeout = "5s"
grace_period = "30s"
method = "GET"
path = "/health"

[env]
PORT = "8100"
HOST = "0.0.0.0"
LOG_LEVEL = "info"
LLM_ENDPOINT = "https://www.recall-touch.com/api/agent/respond"
# CPU-only mode: avoid heavy startup OOM; fallback chain still applies.
TTS_ENGINE = "edge-tts"
# Do not load Kokoro on 512MB–1GB VMs (set ENABLE_KOKORO_FALLBACK=1 to opt in).
ENABLE_KOKORO_FALLBACK = "false"
# Disable GPU-dependent features
USE_GPU = "false"

# Secrets (fly secrets set KEY=value):
# - ELEVENLABS_API_KEY — Cloud TTS (no GPU required)
# - OPENAI_API_KEY — LLM calls to LLM_ENDPOINT
# - HF_TOKEN or HUGGINGFACE_HUB_TOKEN — Hugging Face Hub (gated Orpheus TTS, faster model pulls)
# Optional env (fly secrets set or [env] if non-sensitive):
# - LOAD_STT_ENGINE=false — skip Faster-Whisper at startup (tiny VMs / no STT needed)
# - STT_MODEL=base — whisper size: tiny|base|small|...
# - MODEL_CACHE_DIR=/app/.cache — persist whisper/cache on a volume if you add one

[vm]
# === FREE/DEV TIER (current) ===
# Fly free tier: 3 shared-cpu-1x VMs, 256MB RAM each
# Voice server needs more RAM for models (PyTorch + faster-whisper + hub cache).
memory = 1024
cpu_kind = "shared"
cpus = 2

# === PRODUCTION TIER (uncomment when ready) ===
# machine = "performance-4x"   # Dedicated CPU, good for moderate volume
# memory = 4096                 # 4GB RAM
# cpus = 4
# cpu_kind = "performance"

# === GPU TIER (uncomment for high volume) ===
# machine = "gpu-a10-large"    # ~$100-150/mo
# memory = 16384               # 16GB RAM
# cpus = 4
# cpu_kind = "performance"
# gpus = 1

[deploy]
strategy = "rolling"

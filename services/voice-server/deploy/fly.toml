# Fly.io deployment configuration for Recall Touch voice server
# FREE TIER: CPU-only mode for development and testing
# UPGRADE: Switch to GPU when ready for production (see comments below)

app = "recall-voice"
primary_region = "iad" # Northern Virginia, closest to Supabase us-east-2

[build]
dockerfile = "../Dockerfile.cpu"

[http_service]
internal_port = 8100
force_https = true
auto_stop_machines = true    # Stop when idle (saves money)
auto_start_machines = true   # Start on first request
min_machines_running = 1     # Keep one warm machine to avoid cold-start gaps

[http_service.concurrency]
type = "connections"
hard_limit = 100
soft_limit = 50

[[http_service.checks]]
interval = "15s"
timeout = "5s"
grace_period = "30s"
method = "GET"
path = "/health"

[env]
PORT = "8100"
HOST = "0.0.0.0"
LOG_LEVEL = "info"
LLM_ENDPOINT = "https://www.recall-touch.com/api/agent/respond"
# CPU-only mode: use lighter TTS models (Kokoro 82M params)
TTS_ENGINE = "kokoro"
# Disable GPU-dependent features
USE_GPU = "false"

# Required secrets (set via: fly secrets set KEY=value):
# - OPENAI_API_KEY (for LLM calls)

[vm]
# === FREE/DEV TIER (current) ===
# Fly free tier: 3 shared-cpu-1x VMs, 256MB RAM each
# Voice server needs more RAM for models, so using shared-cpu-2x
memory = 512           # 512MB — enough for Kokoro (82M params)
cpu_kind = "shared"
cpus = 2

# === PRODUCTION TIER (uncomment when ready) ===
# machine = "performance-4x"   # Dedicated CPU, good for moderate volume
# memory = 4096                 # 4GB RAM
# cpus = 4
# cpu_kind = "performance"

# === GPU TIER (uncomment for high volume) ===
# machine = "gpu-a10-large"    # ~$100-150/mo
# memory = 16384               # 16GB RAM
# cpus = 4
# cpu_kind = "performance"
# gpus = 1

[deploy]
strategy = "rolling"

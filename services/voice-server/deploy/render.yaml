services:
  - type: web
    name: voice-synthesis-server
    runtime: docker
    plan: gpu
    gpu:
      # Render GPU options
      # a40-large: 48GB VRAM, high throughput
      # a100-40gb: 40GB VRAM, highest tier
      # rtx-4090: Gaming GPU, good for inference
      type: a40-large
      count: 1

    dockerfilePath: ../Dockerfile

    buildFilter:
      paths:
        - services/voice-server/**

    envVars:
      - key: PORT
        value: 8100
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: LLM_ENDPOINT
        value: https://YOUR_APP_NAME.onrender.com/api/agent/respond
      - key: PYTHONUNBUFFERED
        value: '1'

    # Health check configuration
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10

    # Auto-scaling
    numInstances: 1

    # Max instances to scale to
    maxNumInstances: 3

    # Memory and CPU limits
    memoryMB: 16384  # 16GB
    cpuCount: 4

    preDeployCommand: "pip install --no-cache-dir -r requirements.txt"

# PostgreSQL for session persistence (optional)
# databases:
#   - name: voice-cache
#     plan: free

envVarGroups:
  - name: production
    displayName: Production Environment
    envVars:
      - key: LOG_LEVEL
        value: warning
      - key: LLM_ENDPOINT
        value: https://YOUR_APP_NAME.onrender.com/api/agent/respond

notificationEmail: your-email@example.com

version: "3.8"

services:
  voice-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - PORT=8100
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      # LLM endpoint for conversation responses
      - LLM_ENDPOINT=http://localhost:3000/api/agent/respond
    volumes:
      - ./voices:/app/voices
      - ./cache:/app/.cache
    networks:
      - voice-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  voice-net:
    driver: bridge

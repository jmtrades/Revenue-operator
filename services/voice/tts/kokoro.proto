syntax = "proto3";

package kokoro;

service KokoroTTS {
  rpc Synthesize (SynthesizeRequest) returns (SynthesizeResponse);
}

message SynthesizeRequest {
  string text = 1;
  string voice_preset = 2;
  string workspace_id = 3;
  double speed = 4;
  double volume = 5;
}

message SynthesizeResponse {
  bytes audio_wav = 1;
  string mime_type = 2;
}

